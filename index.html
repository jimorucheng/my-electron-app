<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title></title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #ffffff; /* ✅ 防止闪烁 */
      }
      #myWebview {
        width: 100%;
        height: 100%;
        border: none;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <!-- src="http://10.30.10.3:5174/orthopedic/home" -->
    <!-- src="https://test.cwdata.com/orthopedic/home" -->
    <webview
      id="myWebview"
      src="https://test.cwdata.com/orthopedic/home"
      allowpopups
      style="background: #fff"
    ></webview>

    <script>
      window.electronAPI.ping();

      const webview = document.getElementById("myWebview");

      window.electronAPI.ping();

      webview.addEventListener("did-finish-load", () => {
        console.log("✅ Webview loaded:", webview.getURL());
        window.electronAPI.webviewReady();

        // ✅ 向 webview 注入全局退出函数
        webview.executeJavaScript(`
      window.exitApp = () => {
        window.postMessage({ type: "exit-app" }, "*");
      };
    `);
      });

      // ✅ 接收来自 webview 页面发送的退出消息
      window.addEventListener("message", (event) => {
        if (event.data?.type === "exit-app") {
          console.log("📩 收到退出指令，准备退出应用...");
          window.electronAPI.exitApp();
        }
      });
    </script>
  </body>
</html>
