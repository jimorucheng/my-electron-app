<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Electron WebView Demo</title>
    <style>
      body, html {
        margin: 0;
        height: 100%;
        width: 100%;
      }
      #myWebview {
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
  </head>
  <body>
    <!-- Webview 加载网页 -->
    <webview
      id="myWebview"
      src="http://10.30.10.3:5174/home"
      allowpopups
    ></webview>

    <script>
      window.electronAPI.ping();

      const webview = document.getElementById("myWebview");

      webview.addEventListener("did-finish-load", () => {
        console.log("✅ Webview loaded:", webview.getURL());
      });
    </script>
  </body>
</html>
