<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title></title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #ffffff; /* ✅ 防止闪烁 */
      }
      #myWebview {
        width: 100%;
        height: 100%;
        border: none;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <!-- src="http://10.30.10.3:5174/orthopedic/home" -->
    <!-- src="https://test.cwdata.com/orthopedic/home" -->
    <webview
      id="myWebview"
      src="http://172.20.10.2:5174/orthopedic/home"
      allowpopups
      style="background: #fff"
      partition="nopersist"
      preload="./preload.js"
    ></webview>

    <script>

      const webview = document.getElementById("myWebview");

      window.electronAPI.ping();

      webview.addEventListener("did-finish-load", () => {
        console.log("✅ H5页面加载完成:", webview.getURL());
        window.electronAPI.webviewReady();
      });

      webview.addEventListener("did-fail-load", (event,errorCode,errorDescription) => {
        console.log("H5页面加载失败:", errorDescription);
      });

      // ✅ 接收来自 webview 页面发送的退出消息
      window.addEventListener("ipc-message", (event) => {
        if (event.channel === "close-app") {
          // 转发消息给主进程关闭窗口
          window.electronAPI.closeWindow();
        }
      });
    </script>
  </body>
</html>
