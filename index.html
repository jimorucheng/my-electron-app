<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title></title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #ffffff; /* ✅ 防止闪烁 */
      }
      #myWebview {
        width: 100%;
        height: 100%;
        border: none;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <!-- src="http://10.30.10.3:5174/orthopedic" -->
    <webview
      id="myWebview"
      src="https://test.cwdata.com/orthopedic/home"
      allowpopups
      style="background:#fff"
    ></webview>

    <script>
      window.electronAPI.ping();

      const webview = document.getElementById("myWebview");

      // ✅ 等 webview 加载完成后再显示主窗口
      webview.addEventListener("did-finish-load", () => {
        console.log("✅ Webview loaded:", webview.getURL());
        window.electronAPI.webviewReady();
      });
    </script>
  </body>
</html>
